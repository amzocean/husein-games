<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>huseinlovesyou</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header id="top-bar">
      <div class="top-bar-row">
        <h1 class="brand">huseinlovesyou</h1>
        <button id="btn-new-game" class="new-game-btn" title="New Board">✨ New</button>
      </div>
      <div id="score-bar">
        <span class="score-pill"><span id="current-combo" class="score-value">0</span> combo</span>
        <span class="score-dot">·</span>
        <span class="score-pill"><span id="longest-combo" class="score-value">0</span> best</span>
        <span class="score-dot">·</span>
        <span class="score-pill"><span id="tiles-cleared" class="score-value">0/24</span> cleared</span>
      </div>
    </header>

    <!-- Win indicator — appears between header and board -->
    <p id="win-banner"></p>

    <!-- Theme toast — shows briefly on new game -->
    <div id="theme-toast"></div>

    <!-- Game Board -->
    <div id="board-container">
      <div id="board"></div>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
